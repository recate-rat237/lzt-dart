name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }} / Dart ${{ matrix.sdk }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        sdk: [stable, beta]

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        if: matrix.sdk == 'stable' && matrix.os == 'ubuntu-latest'

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: dart test

  codegen:
    name: Regenerate and commit clients
    runs-on: ubuntu-latest
    # Only auto-commit on direct pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Regenerate clients
        run: |
          dart run codegen/generate.dart \
            --schema schemas/forum.json \
            --output lib/src/forum/forum_client.dart \
            --class-name ForumClient \
            --base-url https://api.lzt.market

          dart run codegen/generate.dart \
            --schema schemas/market.json \
            --output lib/src/market/market_client.dart \
            --class-name MarketClient \
            --base-url https://api.lzt.market

      - name: Commit regenerated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/src/forum/forum_client.dart lib/src/market/market_client.dart
          git diff --staged --quiet || git commit -m "chore: regenerate clients from OpenAPI schemas [skip ci]"
          git push